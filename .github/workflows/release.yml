name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
      - name: Zbuduj bundle .mcpb
        run: |
          mkdir -p dist
          npx --yes @anthropic-ai/mcpb pack . dist/fakturownia.mcpb
      - name: Utwórz wydanie z plikiem .mcpb
        uses: softprops/action-gh-release@v3
        with:
          files: dist/fakturownia.mcpb
          generate_release_notes: true

  # Po opublikowaniu paczki odśwież stronę z numerem wersji z tagu.
  # (Release utworzony przez Actions nie odpala triggera release:published,
  #  więc wołamy pages.yml wprost przez workflow_call.)
  pages:
    needs: release
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
    with:
      version: ${{ github.ref_name }}
