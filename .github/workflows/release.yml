name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Zbuduj bundle .mcpb
        run: |
          mkdir -p dist
          npx --yes @anthropic-ai/mcpb pack . dist/fakturownia.mcpb
      - name: Utwórz wydanie z plikiem .mcpb
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fakturownia.mcpb
          generate_release_notes: true
