name: Pages

on:
  # Zmiany w treści strony lub metadanych na main.
  push:
    branches: [main]
    paths:
      - "site/**"
      - "CHANGELOG.md"
      - "manifest.json"
      - "icon.png"
      - ".github/workflows/pages.yml"
  # Wywoływane przez release.yml po opublikowaniu nowej paczki .mcpb.
  # (Release tworzony przez Actions nie odpala triggera release:published,
  #  dlatego wołamy ten workflow wprost.)
  workflow_call:
    inputs:
      version:
        description: "Wersja do pokazania (np. tag wydania). Puste = fallback z CHANGELOG.md."
        type: string
        required: false
        default: ""
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Jeden deploy na raz; nie przerywaj trwającego.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Zbuduj stronę (wstrzyknij wersję i notatki)
        run: node site/build.mjs
        env:
          REPO: ${{ github.repository }}
          # Wersja z inputu (workflow_call z release.yml). Przy push/dispatch
          # jest pusta, więc build.mjs bierze fallback z manifest.json / CHANGELOG.md.
          SITE_VERSION: ${{ inputs.version }}
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
